# RoleBinding для namespace-специфичных ролей (пример для namespace "propdev-production")
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: namespace-developer-binding
  namespace: propdev-production
subjects:
- kind: Group
  name: product:functional-team
  apiGroup: rbac.authorization.k8s.io
- kind: Group
  name: product:backend-devs
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: namespace-developer
  apiGroup: rbac.authorization.k8s.io
